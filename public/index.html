<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluvai — ИИ-агенты под ключ</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #16161f;
      --border: rgba(255,255,255,0.08);
      --accent: #7c5cfc;
      --accent2: #4f8ef7;
      --text: #f0f0f8;
      --muted: #8888aa;
      --card: rgba(255,255,255,0.04);
      --card-hover: rgba(255,255,255,0.07);
      --radius: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 40px;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .nav-links { display: flex; gap: 32px; }
    .nav-links a {
      color: var(--muted); text-decoration: none; font-size: 0.9rem;
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .lang-switcher { display: flex; gap: 4px; }
    .lang-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem;
      transition: all .2s;
    }
    .lang-btn.active, .lang-btn:hover {
      background: var(--accent); border-color: var(--accent); color: #fff;
    }
    .cta-nav {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; padding: 9px 22px; border-radius: 10px;
      cursor: pointer; font-size: 0.9rem; font-weight: 600;
      transition: opacity .2s;
    }
    .cta-nav:hover { opacity: 0.85; }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 120px 24px 80px;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; top: -40%; left: 50%; transform: translateX(-50%);
      width: 900px; height: 900px; border-radius: 50%;
      background: radial-gradient(circle, rgba(124,92,252,0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(124,92,252,0.15); border: 1px solid rgba(124,92,252,0.3);
      padding: 6px 18px; border-radius: 100px; font-size: 0.82rem; color: #b49fff;
      margin-bottom: 28px;
    }
    .hero-badge::before { content: '✦'; font-size: 0.7rem; }
    h1 {
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 900; letter-spacing: -2px; line-height: 1.08;
      margin-bottom: 24px;
    }
    h1 span {
      background: linear-gradient(135deg, var(--accent) 20%, var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-size: clamp(1rem, 2vw, 1.2rem); color: var(--muted);
      max-width: 620px; margin: 0 auto 44px;
    }
    .hero-btns { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; padding: 15px 34px; border-radius: 12px;
      font-size: 1rem; font-weight: 700; cursor: pointer; transition: all .2s;
      box-shadow: 0 8px 30px rgba(124,92,252,0.35);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(124,92,252,0.5); }
    .btn-secondary {
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); padding: 15px 34px; border-radius: 12px;
      font-size: 1rem; font-weight: 600; cursor: pointer; transition: all .2s;
    }
    .btn-secondary:hover { background: var(--card-hover); }
    .hero-stats {
      display: flex; gap: 48px; margin-top: 72px; flex-wrap: wrap; justify-content: center;
    }
    .stat { text-align: center; }
    .stat-num {
      font-size: 2.2rem; font-weight: 800; letter-spacing: -1px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-label { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }

    /* ── SECTION ── */
    section { padding: 100px 24px; max-width: 1200px; margin: 0 auto; }
    .section-label {
      font-size: 0.78rem; letter-spacing: 3px; text-transform: uppercase;
      color: var(--accent); font-weight: 700; margin-bottom: 16px;
    }
    h2 {
      font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 800;
      letter-spacing: -1px; line-height: 1.15; margin-bottom: 16px;
    }
    .section-sub { color: var(--muted); font-size: 1.05rem; max-width: 560px; margin-bottom: 60px; }

    /* ── AUDIENCE ── */
    .audience-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .audience-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 36px 32px; transition: all .25s;
    }
    .audience-card:hover { background: var(--card-hover); border-color: rgba(124,92,252,0.3); transform: translateY(-4px); }
    .aud-icon { font-size: 2.2rem; margin-bottom: 18px; }
    .aud-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 10px; }
    .aud-desc { color: var(--muted); font-size: 0.9rem; line-height: 1.7; }
    .aud-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px; }
    .tag {
      background: rgba(124,92,252,0.1); border: 1px solid rgba(124,92,252,0.2);
      color: #b49fff; padding: 3px 11px; border-radius: 100px; font-size: 0.75rem;
    }

    /* ── CASES ── */
    .cases-tabs { display: flex; gap: 8px; margin-bottom: 36px; flex-wrap: wrap; }
    .tab-btn {
      background: var(--card); border: 1px solid var(--border); color: var(--muted);
      padding: 9px 22px; border-radius: 10px; cursor: pointer; font-size: 0.88rem;
      transition: all .2s; font-weight: 500;
    }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .cases-panel { display: none; }
    .cases-panel.active { display: block; }
    .cases-grid { display: grid; gap: 14px; }
    .case-row {
      display: grid; grid-template-columns: 40px 1fr 1fr auto; align-items: center;
      gap: 20px; background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px 24px; transition: all .2s;
    }
    .case-row:hover { background: var(--card-hover); border-color: rgba(124,92,252,0.25); }
    .case-num { font-size: 0.75rem; color: var(--muted); font-weight: 700; font-family: monospace; }
    .case-name { font-weight: 700; font-size: 0.95rem; }
    .case-desc { color: var(--muted); font-size: 0.88rem; }
    .case-effect {
      background: rgba(79,142,247,0.1); border: 1px solid rgba(79,142,247,0.25);
      color: #7eb8ff; padding: 5px 14px; border-radius: 8px; font-size: 0.8rem;
      font-weight: 600; white-space: nowrap; text-align: center;
    }

    /* ── PRICING ── */
    .pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .pricing-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 36px 32px; position: relative; transition: all .25s;
    }
    .pricing-card.featured {
      background: linear-gradient(135deg, rgba(124,92,252,0.12), rgba(79,142,247,0.08));
      border-color: rgba(124,92,252,0.4);
    }
    .pricing-card:hover { transform: translateY(-4px); }
    .pricing-tier { font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); font-weight: 700; margin-bottom: 8px; }
    .pricing-name { font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; }
    .pricing-time { color: var(--muted); font-size: 0.88rem; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
    .pricing-features { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .pricing-features li { display: flex; align-items: flex-start; gap: 10px; font-size: 0.9rem; color: var(--muted); }
    .pricing-features li::before { content: '✓'; color: var(--accent); font-weight: 800; margin-top: 1px; flex-shrink: 0; }
    .featured-badge {
      position: absolute; top: -12px; right: 24px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; padding: 4px 14px; border-radius: 100px; font-size: 0.72rem; font-weight: 700;
    }

    /* ── HOW WE WORK ── */
    .steps { display: flex; flex-direction: column; gap: 0; max-width: 700px; }
    .step { display: flex; gap: 28px; position: relative; }
    .step:not(:last-child)::after {
      content: ''; position: absolute; left: 20px; top: 48px;
      width: 2px; height: calc(100% - 8px);
      background: linear-gradient(to bottom, var(--accent), transparent);
    }
    .step-num {
      width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.85rem; margin-top: 2px;
    }
    .step-body { padding-bottom: 40px; }
    .step-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 6px; }
    .step-desc { color: var(--muted); font-size: 0.9rem; }

    /* ── WHY ── */
    .why-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
    .why-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 28px 26px; transition: all .25s;
    }
    .why-card:hover { background: var(--card-hover); border-color: rgba(124,92,252,0.3); }
    .why-icon { font-size: 1.8rem; margin-bottom: 14px; }
    .why-title { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
    .why-desc { color: var(--muted); font-size: 0.87rem; line-height: 1.65; }

    /* ── STACK ── */
    .stack-categories { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
    .stack-cat {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 24px 22px;
    }
    .stack-cat-label { font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; font-weight: 700; }
    .stack-items { display: flex; flex-wrap: wrap; gap: 8px; }
    .stack-item {
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      padding: 5px 13px; border-radius: 8px; font-size: 0.82rem; font-weight: 500;
    }

    /* ── CTA ── */
    .cta-section {
      text-align: center; padding: 100px 24px;
      background: linear-gradient(135deg, rgba(124,92,252,0.08), rgba(79,142,247,0.05));
      border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    }
    .cta-section h2 { margin-bottom: 16px; }
    .cta-section p { color: var(--muted); max-width: 500px; margin: 0 auto 36px; }

    /* ── FOOTER ── */
    footer {
      padding: 40px 40px; display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid var(--border); flex-wrap: wrap; gap: 16px;
    }
    .footer-logo { font-size: 1.2rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a { color: var(--muted); text-decoration: none; font-size: 0.85rem; transition: color .2s; }
    .footer-links a:hover { color: var(--text); }
    .footer-copy { color: var(--muted); font-size: 0.8rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      nav { padding: 14px 20px; }
      .nav-links { display: none; }
      .case-row { grid-template-columns: 40px 1fr; }
      .case-desc { display: none; }
      .case-effect { display: none; }
      footer { flex-direction: column; text-align: center; }
    }
  </style>
</head>

let currentLang = 'ru';

function t(key) {
  return translations[currentLang][key] || key;
}

function showTab(id) {
  document.querySelectorAll('.cases-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('cases-' + id).classList.add('active');
  event.target.classList.add('active');
}

function renderAudience() {
  const grid = document.getElementById('audience-grid');
  grid.innerHTML = t('audience').map(a => `
    <div class="audience-card">
      <div class="aud-icon">${a.icon}</div>
      <div class="aud-title">${a.title}</div>
      <div class="aud-desc">${a.desc}</div>
      <div class="aud-tags">${a.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}</div>
    </div>
  `).join('');
}

function renderCases(key, gridId) {
  const grid = document.getElementById(gridId);
  grid.innerHTML = t(key).map(c => `
    <div class="case-row">
      <span class="case-num">${c.num}</span>
      <span class="case-name">${c.name}</span>
      <span class="case-desc">${c.desc}</span>
      <span class="case-effect">${c.effect}</span>
    </div>
  `).join('');
}

function renderPricing() {
  const grid = document.getElementById('pricing-grid');
  grid.innerHTML = t('pricing').map(p => `
    <div class="pricing-card${p.featured ? ' featured' : ''}">
      ${p.featured ? `<div class="featured-badge">${p.badge}</div>` : ''}
      <div class="pricing-tier">${p.tier}</div>
      <div class="pricing-name">${p.name}</div>
      <div class="pricing-time">${p.time}</div>
      <ul class="pricing-features">
        ${p.features.map(f => `<li>${f}</li>`).join('')}
      </ul>
    </div>
  `).join('');
}

function renderSteps() {
  const steps = document.getElementById('steps');
  steps.innerHTML = t('steps').map((s, i) => `
    <div class="step">
      <div class="step-num">${String(i+1).padStart(2,'0')}</div>
      <div class="step-body">
        <div class="step-title">${s.title}</div>
        <div class="step-desc">${s.desc}</div>
      </div>
    </div>
  `).join('');
}

function renderWhy() {
  const grid = document.getElementById('why-grid');
  grid.innerHTML = t('why').map(w => `
    <div class="why-card">
      <div class="why-icon">${w.icon}</div>
      <div class="why-title">${w.title}</div>
      <div class="why-desc">${w.desc}</div>
    </div>
  `).join('');
}

function renderStack() {
  const grid = document.getElementById('stack-grid');
  grid.innerHTML = t('stack').map(s => `
    <div class="stack-cat">
      <div class="stack-cat-label">${s.label}</div>
      <div class="stack-items">${s.items.map(i => `<span class="stack-item">${i}</span>`).join('')}</div>
    </div>
  `).join('');
}

function renderAll() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const val = translations[currentLang][key];
    if (val && typeof val === 'string') el.textContent = val;
  });
  renderAudience();
  renderCases('cases.ind', 'grid-ind');
  renderCases('cases.sme', 'grid-sme');
  renderCases('cases.ent', 'grid-ent');
  renderPricing();
  renderSteps();
  renderWhy();
  renderStack();
  document.documentElement.lang = currentLang;
}

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.lang-btn').forEach(b => {
    if (b.textContent === lang.toUpperCase()) b.classList.add('active');
  });
  renderAll();
}

renderAll();
</script>
</body>
</html>
